version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sagar-furniture-db
    environment:
      - POSTGRES_DB=sagar
      - POSTGRES_USER=aditya
      - POSTGRES_PASSWORD=india&2026
    volumes:
      - sagar-postgres:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: sagar-furniture-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - D:/SagarFurniture:/app/media
    environment:
      - DATABASE_URL=postgresql+psycopg2://aditya:india%262026@db:5432/sagar
      - MEDIA_ROOT=/app/media
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: sagar-furniture-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sagar-postgres:
