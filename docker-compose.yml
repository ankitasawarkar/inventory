version: '3.8'

services:
  backend:
    build: ./backend
    container_name: sagar-furniture-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sagar-media:/app/media
      - sagar-db:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/sagar.db
      - MEDIA_ROOT=/app/media
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: sagar-furniture-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sagar-media:
  sagar-db:
